<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:linear-gradient(135deg,#98FB98,#66CDAA,#20B2AA);
}

/* เมนู */
.menu{
    background:#006400;
    padding:18px;
    text-align:center;
}

.menu a{
    color:white;
    text-decoration:none;
    margin:18px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.menu a:hover{
    color:yellow;
}

/* เนื้อหา */
.container{
    width:80%;
    max-width:800px;
    margin:40px auto;
}

.title{
    text-align:center;
    color:white;
    font-size:40px;
    margin-bottom:20px;
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    border:5px solid white;
    display:block;
    margin:0 auto 30px;
    object-fit:cover;
    box-shadow:0 0 20px gray;
    transition:0.5s;
}

.profile:hover{
    transform:scale(1.1) rotate(5deg);
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 8px 15px rgba(0,0,0,.2);
    border-left:10px solid green;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 15px 30px rgba(0,0,0,.3);
}

.card h2{
    color:#006400;
    margin-bottom:10px;
}

.card p{
    font-size:20px;
}

footer{
    text-align:center;
    color:white;
    padding:20px;
    font-size:18px;
}

/* เอฟเฟกต์หิมะ */
.snow{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
}

.snow span{
    position:absolute;
    top:-10%;
    color:white;
    font-size:25px;
    animation:snowfall linear infinite;
}

.snow span:nth-child(1){left:5%;animation-duration:8s;}
.snow span:nth-child(2){left:15%;animation-duration:12s;}
.snow span:nth-child(3){left:25%;animation-duration:10s;}
.snow span:nth-child(4){left:35%;animation-duration:9s;}
.snow span:nth-child(5){left:45%;animation-duration:11s;}
.snow span:nth-child(6){left:55%;animation-duration:13s;}
.snow span:nth-child(7){left:65%;animation-duration:8s;}
.snow span:nth-child(8){left:75%;animation-duration:12s;}
.snow span:nth-child(9){left:85%;animation-duration:10s;}
.snow span:nth-child(10){left:95%;animation-duration:9s;}

@keyframes snowfall{
    from{
        transform:translateY(-10vh) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>

</head>
<body>
