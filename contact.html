<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    background:linear-gradient(-45deg,#00c9a7,#00e5ff,#6dd5ed,#89f7fe,#b7f8db);
    background-size:500% 500%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* วงแสง */

body::before,
body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.45;
}

body::before{
    background:#00ffd5;
    top:-120px;
    left:-120px;
    animation:light1 8s infinite alternate;
}

body::after{
    background:#00bfff;
    bottom:-120px;
    right:-120px;
    animation:light2 8s infinite alternate;
}

@keyframes light1{
    to{
        transform:translate(80px,80px);
    }
}

@keyframes light2{
    to{
        transform:translate(-80px,-80px);
    }
}

/* หิมะ */

.snow,
.snow2,
.snow3{
    position:fixed;
    top:-100%;
    left:0;
    width:100%;
    height:300%;
    pointer-events:none;

    background-image:
    radial-gradient(4px 4px at 100px 50px,#fff,transparent),
    radial-gradient(3px 3px at 300px 150px,#fff,transparent),
    radial-gradient(4px 4px at 500px 250px,#fff,transparent),
    radial-gradient(5px 5px at 700px 350px,#fff,transparent),
    radial-gradient(3px 3px at 900px 120px,#fff,transparent),
    radial-gradient(4px 4px at 1100px 300px,#fff,transparent),
    radial-gradient(5px 5px at 1300px 180px,#fff,transparent);

    animation:snowFall 18s linear infinite;
    opacity:.8;
}

.snow2{
    animation-duration:25s;
    opacity:.6;
    transform:scale(1.3);
}

.snow3{
    animation-duration:35s;
    opacity:.4;
    transform:scale(1.6);
}

@keyframes snowFall{
    from{
        transform:translateY(-100%);
    }

    to{
        transform:translateY(100%);
    }
}
    .container{
    position:relative;
    width:90%;
    max-width:720px;
    padding:45px;
    text-align:center;
    border-radius:30px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.35);
    box-shadow:
    0 0 25px rgba(0,255,255,.4),
    0 0 60px rgba(0,255,200,.25);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

h1{
    color:#fff;
    font-size:48px;
    text-shadow:
    0 0 10px #00ffff,
    0 0 25px #00ffff;
}

.line{
    width:120px;
    height:5px;
    background:#fff;
    border-radius:50px;
    margin:20px auto 35px;
}

.card{
    margin:18px 0;
    padding:22px;
    border-radius:20px;
    background:rgba(255,255,255,.18);
    color:#fff;
    transition:.4s;
}

.card:hover{
    transform:translateY(-8px) scale(1.04);
    background:rgba(255,255,255,.28);
    box-shadow:
    0 0 25px #00ffff,
    0 0 45px #00ffd5;
}

.icon{
    font-size:45px;
    margin-bottom:10px;
}

.card h2{
    margin-bottom:10px;
}

.card p,
.card a{
    color:#fff;
    text-decoration:none;
    font-size:20px;
}

.card a:hover{
    color:#00ffd5;
}

.social{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:25px;
}

.social a{
    width:60px;
    height:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    background:rgba(255,255,255,.18);
    color:#fff;
    font-size:28px;
    text-decoration:none;
    transition:.5s;
}

.social a:hover{
    transform:rotate(360deg) scale(1.2);
    background:#fff;
    color:#00bfa6;
    box-shadow:0 0 30px #00ffff;
}

.btn{
    display:inline-block;
    margin-top:35px;
    padding:15px 40px;
    border-radius:50px;
    background:linear-gradient(45deg,#00c9a7,#00bfff);
    color:#fff;
    text-decoration:none;
    font-size:20px;
    transition:.4s;
    box-shadow:0 0 25px rgba(0,255,255,.5);
}

.btn:hover{
    transform:scale(1.08);
    background:#fff;
    color:#00a896;
}

footer{
    margin-top:30px;
    color:#fff;
    opacity:.9;
    font-size:15px;
}

</style>
</head>
