<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Tahoma',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:650px;
    padding:40px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 35px rgba(0,0,0,.3);
    color:#fff;
}

.container h1{
    font-size:45px;
    margin-bottom:15px;
}

.line{
    width:100px;
    height:5px;
    background:#fff;
    margin:auto;
    border-radius:50px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,.15);
    padding:20px;
    border-radius:20px;
    margin:18px 0;
    transition:.4s;
}

.card:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,.25);
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}

.card h2{
    margin-bottom:8px;
    font-size:24px;
}

.card p,
.card a{
    font-size:20px;
    color:#fff;
    text-decoration:none;
}

.card a:hover{
    color:yellow;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    border-radius:40px;
    text-decoration:none;
    color:#fff;
    background:#ff4b91;
    font-size:20px;
    transition:.4s;
}

.btn:hover{
    background:#fff;
    color:#ff4b91;
    transform:scale(1.08);
}

footer{
    margin-top:30px;
    font-size:15px;
    opacity:.8;
}
</style>

</head>
<body>

<div class="container">

<h1>📞 Contact Me</h1>

<div class="line"></div>

<div class="card">
    <div class="icon">📱</div>
    <h2>Phone</h2>
    <p>061-4687186</p>
</div>

<div class="card">
    <div class="icon">📧</div>
    <h2>Email</h2>
    <a href="mailto:lookkaew24.com@gmail.com">
        lookkaew24.com@gmail.com
    </a>
</div>

<div class="card">
    <div class="icon">📷</div>
    <h2>Instagram</h2>
    <a href="https://www.instagram.com/kaew_24.12.51" target="_blank">
        @kaew_24.12.51
    </a>
</div>

<a href="index.html" class="btn">🏠 กลับหน้าหลัก</a>

<footer>
    © 2026 Portfolio | Designed by Kaew
</footer>

</div>

</body>
</html>
